{# Unified thermal receipt styles — 58mm or 80mm paper. Print only .receipt block. #}
<style>
    {% if receipt_paper_size == '58mm' %}
    @page { size: 58mm auto; margin: 0; }
    {% else %}
    @page { size: 80mm auto; margin: 0; }
    {% endif %}

    * { box-sizing: border-box; }

    html {
        height: auto;
        background: #fff;
    }

    body {
        font-family: Arial, Helvetica, "Segoe UI", sans-serif;
        {% if receipt_paper_size == '58mm' %}
        font-size: 10px;
        width: 52mm;
        {% else %}
        font-size: 11px;
        width: 72mm;
        max-width: 72mm;
        {% endif %}
        margin: 0 auto;
        padding: 0;
        background: #fff;
        color: #000;
        line-height: 1.35;
        height: auto;
        min-height: 0;
    }

    @media screen {
        .receipt { padding: 3mm 2mm; }
    }

    .receipt {
        width: 100%;
        max-width: 100%;
    }

    /* ---- Header ---- */
    .thermal-header {
        text-align: center;
        margin-bottom: 6px;
    }

    .thermal-header h1 {
        {% if receipt_paper_size == '58mm' %}
        font-size: 14px;
        {% else %}
        font-size: 16px;
        {% endif %}
        font-weight: 800;
        margin: 0 0 3px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .thermal-header p {
        margin: 2px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        font-weight: 600;
    }

    .thermal-logo img {
        max-width: 100%;
        {% if receipt_paper_size == '58mm' %}
        max-height: 32px;
        {% else %}
        max-height: 40px;
        {% endif %}
        margin-bottom: 4px;
        object-fit: contain;
    }

    .thermal-divider {
        border: none;
        border-top: 1px solid #000;
        margin: 6px 0;
        height: 0;
    }

    /* ---- Meta / labels ---- */
    .thermal-meta p {
        margin: 2px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        font-weight: 600;
        line-height: 1.35;
        word-wrap: break-word;
    }

    .thermal-label {
        font-weight: 800;
    }

    .thermal-highlight {
        font-weight: 800 !important;
        {% if receipt_paper_size == '58mm' %}
        font-size: 11px !important;
        {% else %}
        font-size: 12px !important;
        {% endif %}
    }

    .kitchen-title {
        letter-spacing: 0.08em;
    }

    /* ---- Order line items (customer bill) ---- */
    .thermal-items {
        margin: 4px 0;
    }

    .thermal-item-box {
        border: 1px solid #000;
        padding: 5px 6px;
        margin-bottom: 6px;
    }

    .thermal-item-name {
        font-weight: 800;
        word-wrap: break-word;
        {% if receipt_paper_size == '58mm' %}
        font-size: 10px;
        {% else %}
        font-size: 11px;
        {% endif %}
        margin-bottom: 3px;
        line-height: 1.25;
    }

    .thermal-item-note {
        font-size: 9px;
        font-weight: 600;
        margin-top: 3px;
        color: #000;
    }

    .thermal-item-line {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-top: 2px;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        font-weight: 700;
    }

    .thermal-item-line > span:first-child {
        flex: 1;
        min-width: 0;
    }

    .thermal-item-total {
        flex-shrink: 0;
        white-space: nowrap;
        font-weight: 800;
        text-align: right;
    }

    /* Legacy item row (no box) */
    .thermal-item {
        margin: 0 0 5px;
        padding-bottom: 4px;
        border-bottom: 1px solid #000;
    }

    .thermal-item:last-child {
        border-bottom: none;
    }

    /* ---- Kitchen ticket items ---- */
    .kitchen-item {
        display: flex;
        align-items: stretch;
        border: 1px solid #000;
        margin-bottom: 6px;
    }

    .kitchen-qty {
        min-width: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        {% if receipt_paper_size == '58mm' %}
        font-size: 13px;
        {% else %}
        font-size: 14px;
        {% endif %}
        border-right: 1px solid #000;
        padding: 6px 4px;
    }

    .kitchen-name-wrap {
        flex: 1;
        padding: 6px 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
    }

    .kitchen-name {
        font-weight: 800;
        {% if receipt_paper_size == '58mm' %}
        font-size: 10px;
        {% else %}
        font-size: 11px;
        {% endif %}
        word-wrap: break-word;
        line-height: 1.25;
    }

    .kitchen-sub {
        font-size: 9px;
        font-weight: 600;
        margin-top: 2px;
    }

    /* ---- Category-wise kitchen blocks ---- */
    .block.smallprint {
        border: 1px solid #000;
        padding: 3mm 2mm;
        margin-bottom: 4mm;
    }

    .block.smallprint .thermal-header h1 {
        {% if receipt_paper_size == '58mm' %}
        font-size: 12px;
        {% else %}
        font-size: 13px;
        {% endif %}
    }

    .block.smallprint .thermal-header p {
        {% if receipt_paper_size == '58mm' %}
        font-size: 8px;
        {% else %}
        font-size: 9px;
        {% endif %}
    }

    .block.smallprint .kitchen-item {
        margin-bottom: 4px;
    }

    .block.smallprint .kitchen-qty {
        min-width: 26px;
        {% if receipt_paper_size == '58mm' %}
        font-size: 11px;
        {% else %}
        font-size: 12px;
        {% endif %}
        padding: 4px 3px;
    }

    .block.smallprint .kitchen-name {
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
    }

    .block.smallprint .thermal-divider {
        margin: 4px 0;
    }

    /* ---- Totals ---- */
    .thermal-totals {
        margin-top: 4px;
    }

    .thermal-total-line {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        padding: 2px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        font-weight: 700;
    }

    .thermal-total-line > span:first-child {
        flex: 1;
        min-width: 0;
    }

    .thermal-total-line > span:last-child {
        flex-shrink: 0;
        white-space: nowrap;
        text-align: right;
        font-weight: 800;
    }

    .thermal-total-line.discount > span:last-child {
        font-weight: 800;
    }

    .thermal-total-line.grand {
        font-weight: 800;
        {% if receipt_paper_size == '58mm' %}
        font-size: 12px;
        {% else %}
        font-size: 14px;
        {% endif %}
        border-top: 2px solid #000;
        margin-top: 6px;
        padding-top: 6px;
    }

    .thermal-total-line.grand > span {
        font-weight: 900 !important;
    }

    .thermal-total-note {
        text-align: center;
        font-size: 9px;
        font-weight: 600;
        margin: 3px 0;
    }

    .thermal-footer {
        text-align: center;
        margin-top: 8px;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        font-weight: 700;
    }

    .thermal-footer p {
        margin: 3px 0;
    }

    /* ---- Screen print controls ---- */
    .print-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
        padding: 8px;
        background: #f1f5f9;
        border-radius: 6px;
        max-width: 320px;
    }

    .print-controls button,
    .print-controls a {
        padding: 8px 12px;
        background: #2b6cb0;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        font-size: 13px;
        font-family: Arial, sans-serif;
    }

    .print-controls button:hover,
    .print-controls a:hover {
        background: #1e4f8a;
    }

    /* ---- Print: only .receipt block ---- */
    @media print {
        html, body {
            {% if receipt_paper_size == '58mm' %}
            width: 58mm !important;
            {% else %}
            width: 80mm !important;
            {% endif %}
            height: auto !important;
            min-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            background: #fff !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body * {
            visibility: hidden;
        }

        .receipt,
        .receipt * {
            visibility: visible;
        }

        .receipt {
            position: absolute;
            left: 0;
            top: 0;
            {% if receipt_paper_size == '58mm' %}
            width: 52mm !important;
            max-width: 52mm !important;
            {% else %}
            width: 72mm !important;
            max-width: 72mm !important;
            {% endif %}
            margin: 0 !important;
            padding: 2mm !important;
            page-break-after: avoid !important;
            page-break-inside: avoid !important;
        }

        .print-controls,
        .no-print {
            display: none !important;
        }

        body, .receipt, .receipt * {
            color: #000 !important;
            -webkit-text-fill-color: #000 !important;
            opacity: 1 !important;
            background: transparent !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .thermal-item-total,
        .thermal-total-line > span:last-child {
            white-space: nowrap !important;
            word-break: normal !important;
            max-width: none !important;
        }

        .thermal-divider {
            border-top: 1px solid #000 !important;
        }

        .thermal-item-box,
        .kitchen-item {
            border: 1px solid #000 !important;
        }

        .receipt .block.smallprint {
            width: 100% !important;
            max-width: 100% !important;
            padding: 2mm !important;
            margin: 0 !important;
            page-break-inside: avoid !important;
            page-break-after: avoid !important;
            break-after: avoid !important;
        }

        .receipt.no-print,
        .receipt.no-print * {
            display: none !important;
            visibility: hidden !important;
        }

        .receipt.print-only {
            position: absolute;
            left: 0;
            top: 0;
            {% if receipt_paper_size == '58mm' %}
            width: 52mm !important;
            max-width: 52mm !important;
            {% else %}
            width: 72mm !important;
            max-width: 72mm !important;
            {% endif %}
            margin: 0 !important;
            padding: 2mm !important;
        }

        .receipt, .receipt * {
            -webkit-font-smoothing: none !important;
            text-shadow: none !important;
        }
    }

    {% if receipt_custom_css %}{{ receipt_custom_css|safe }}{% endif %}
</style>
