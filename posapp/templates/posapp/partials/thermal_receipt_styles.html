{# Thermal receipt base styles. Set receipt_paper_size to 58mm or 80mm (default 80mm). #}
<style>
    {% if receipt_paper_size == '58mm' %}
    @page {
        size: 58mm auto;
        margin: 0;
    }
    {% else %}
    @page {
        size: 80mm auto;
        margin: 0;
    }
    {% endif %}

    * {
        box-sizing: border-box;
    }

    html {
        height: auto;
        background: #fff;
    }

    body {
        font-family: "Courier New", Courier, monospace;
        {% if receipt_paper_size == '58mm' %}
        font-size: 10px;
        width: 52mm;
        {% else %}
        font-size: 11px;
        width: 72mm;
        {% endif %}
        margin: 0 auto;
        padding: 0;
        background: #fff;
        color: #000;
        line-height: 1.25;
        height: auto;
        min-height: 0;
    }

    @media screen {
        .receipt {
            padding: 2mm 1mm;
        }
    }

    .receipt {
        width: 100%;
        max-width: 100%;
    }

    .thermal-header {
        text-align: center;
        margin-bottom: 4px;
    }

    .thermal-header h1 {
        {% if receipt_paper_size == '58mm' %}
        font-size: 13px;
        {% else %}
        font-size: 15px;
        {% endif %}
        font-weight: bold;
        margin: 0 0 2px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
    }

    .thermal-header p {
        margin: 1px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
    }

    .thermal-logo img {
        max-width: 100%;
        {% if receipt_paper_size == '58mm' %}
        max-height: 32px;
        {% else %}
        max-height: 42px;
        {% endif %}
        margin-bottom: 4px;
        object-fit: contain;
    }

    .thermal-divider {
        border: none;
        border-top: 1px dashed #000;
        margin: 5px 0;
        height: 0;
    }

    .thermal-meta p {
        margin: 1px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        line-height: 1.3;
        word-wrap: break-word;
        overflow-wrap: anywhere;
    }

    .thermal-meta .thermal-label {
        font-weight: bold;
    }

    .thermal-items {
        margin: 4px 0;
    }

    .thermal-item {
        margin: 0 0 5px;
        padding-bottom: 4px;
        border-bottom: 1px solid #000;
        page-break-inside: avoid;
    }

    .thermal-item:last-child {
        border-bottom: none;
    }

    .thermal-item-name {
        font-weight: bold;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        {% if receipt_paper_size == '58mm' %}
        font-size: 10px;
        {% else %}
        font-size: 11px;
        {% endif %}
    }

    .thermal-item-note {
        font-size: 9px;
        font-style: italic;
        margin-top: 1px;
        color: #000;
    }

    .thermal-item-line {
        display: flex;
        justify-content: space-between;
        gap: 4px;
        margin-top: 2px;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
    }

    .thermal-item-total {
        font-weight: bold;
        white-space: nowrap;
    }

    .thermal-totals {
        margin-top: 4px;
        page-break-inside: avoid;
    }

    .thermal-total-line {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        padding: 1px 0;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
    }

    .thermal-total-line span:last-child {
        white-space: nowrap;
        text-align: right;
    }

    .thermal-total-line.discount span:last-child {
        font-weight: bold;
    }

    .thermal-total-line.grand {
        font-weight: bold;
        {% if receipt_paper_size == '58mm' %}
        font-size: 12px;
        {% else %}
        font-size: 13px;
        {% endif %}
        border-top: 1px solid #000;
        margin-top: 4px;
        padding-top: 4px;
    }

    .thermal-total-note {
        text-align: center;
        font-size: 9px;
        font-style: italic;
        margin: 2px 0;
    }

    .thermal-footer {
        text-align: center;
        margin-top: 6px;
        {% if receipt_paper_size == '58mm' %}
        font-size: 9px;
        {% else %}
        font-size: 10px;
        {% endif %}
        page-break-inside: avoid;
    }

    .thermal-footer p {
        margin: 2px 0;
    }

    .print-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
        padding: 8px;
        background: #f1f5f9;
        border-radius: 6px;
        max-width: 320px;
    }

    .print-controls button,
    .print-controls a {
        padding: 8px 12px;
        background: #2b6cb0;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        font-size: 13px;
        font-family: Arial, sans-serif;
    }

    .print-controls button:hover,
    .print-controls a:hover {
        background: #1e4f8a;
    }

    @media print {
        html, body {
            {% if receipt_paper_size == '58mm' %}
            width: 58mm !important;
            {% else %}
            width: 80mm !important;
            {% endif %}
            height: auto !important;
            min-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            background: #fff !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body * {
            visibility: hidden;
        }

        .receipt,
        .receipt * {
            visibility: visible;
        }

        .receipt {
            position: absolute;
            left: 0;
            top: 0;
            overflow: hidden;
            box-sizing: border-box;
            {% if receipt_paper_size == '58mm' %}
            width: 52mm !important;
            max-width: 52mm !important;
            {% else %}
            width: 72mm !important;
            max-width: 72mm !important;
            {% endif %}
            margin: 0 !important;
            padding: 1mm 2mm !important;
            page-break-after: avoid !important;
            page-break-inside: avoid !important;
        }

        .print-controls,
        .no-print {
            display: none !important;
        }

        body, .receipt, .receipt * {
            color: #000 !important;
            -webkit-text-fill-color: #000 !important;
            opacity: 1 !important;
            background: transparent !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .thermal-divider {
            border-top: 1px solid #000 !important;
        }

        .thermal-item {
            border-bottom: 1px solid #000 !important;
        }

        .thermal-item-name,
        .thermal-item-line,
        .thermal-item-total,
        .thermal-total-line,
        .thermal-total-line.grand,
        .thermal-label,
        .thermal-header h1,
        .thermal-meta p,
        .thermal-footer,
        .thermal-footer p {
            color: #000 !important;
            -webkit-text-fill-color: #000 !important;
            font-weight: 700 !important;
        }

        .thermal-total-line.grand,
        .thermal-header h1 {
            font-weight: 900 !important;
        }

        .receipt, .receipt * {
            -webkit-font-smoothing: none !important;
            -moz-osx-font-smoothing: unset !important;
            text-shadow: none !important;
        }
    }

    {% if receipt_custom_css %}{{ receipt_custom_css|safe }}{% endif %}
</style>
